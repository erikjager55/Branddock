name: Content Golden-Sets

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/lib/studio/prompt-templates/**'
      - 'src/lib/ai/chains/**'
      - 'src/lib/ai/canvas-orchestrator.ts'
      - 'tests/content-golden-sets/**'
      - '.github/workflows/golden-sets.yml'
  workflow_dispatch:
    # Manual trigger voor adhoc baseline-meting
  schedule:
    # Nightly regressie-check tegen latest production prompts
    - cron: '0 3 * * *'

# Limit concurrent runs van golden-sets (cost-control)
concurrency:
  group: golden-sets-${{ github.ref }}
  cancel-in-progress: true

# De PR-comment-stap schrijft naar issues/PR's; zonder expliciete grant faalt
# hij met "Resource not accessible by integration" (default-token is read-only).
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    # Pre-launch: alleen runnen wanneer ANTHROPIC_API_KEY beschikbaar is (anders
    # would golden-set evals niet werkende judges hebben). Repo-secrets check
    # via job-level if vermijdt fail-on-missing-key voor forks zonder secrets.
    if: ${{ github.repository_owner == 'erikjager55' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # Node 22 vereist (file-type@22 transitive dep van promptfoo).
          node-version: 22
          cache: npm

      - run: npm ci

      # 2026-05-19: Prisma Client niet auto-gegenereerd door npm ci (geen
      # postinstall-script in package.json). Smoke-tests importeren
      # `@prisma/client` transitief via `src/lib/prisma.ts`; zonder generate
      # gooien ze "Cannot find module '.prisma/client/default'" en crashen.
      # Schema-only generate (geen DB-connectie nodig) is ~2-3s op CI.
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Verify Promptfoo installation
        run: npx promptfoo --version

      # The owner-only job `if:` above does NOT prove the secret is actually
      # set — an empty ANTHROPIC_API_KEY on the owner repo still runs the job,
      # and promptfoo then crashes "Missing ANTHROPIC_API_KEY" BEFORE writing
      # its results file, so the pass-rate gate fails on the absent output. That
      # made every nightly scheduled run fail-noisily. Detect the key here and
      # skip the live eval + gate gracefully when it's absent; the deterministic
      # smokes below still run. Adding ANTHROPIC_API_KEY to repo secrets
      # re-activates the live eval automatically.
      - name: Detect LLM keys
        id: keys
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not configured — skipping live golden-set eval + pass-rate gate. Deterministic smokes still run. Add the repo secret to re-enable."
          fi

      # Gate design (prompt-audit 2026-06-11 T8): this set runs a live LLM
      # (generation + llm-rubric judges), so individual cases are inherently
      # flaky. Promptfoo's own exit code is per-case strict (non-zero on ANY
      # failing case), which would make the gate stricter than intended for a
      # main-merge workflow. We therefore swallow the per-case exit code HERE
      # and enforce the real gate in the "Enforce golden-set pass-rate
      # threshold" step on the TOTAL pass-rate (>= 70%). A promptfoo crash
      # produces no results file, which the gate step fails on hard.
      - name: Run blog-post golden-set (long-form representant)
        if: steps.keys.outputs.present == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p .promptfoo-results
          npx promptfoo eval \
            -c tests/content-golden-sets/long-form/blog-post.yaml \
            --output .promptfoo-results/blog-post-results.json \
            --no-progress-bar || echo "::notice::promptfoo exited non-zero (per-case failures or crash) — pass-rate gate step decides"

      - name: Run property-evals smoke (Layer 1 regression check)
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: npx tsx scripts/smoke-tests/property-evals.ts

      - name: Run Plan-and-Solve mock smoke (chain-mechanism regression)
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: npx tsx scripts/smoke-tests/plan-and-solve.ts

      - name: Run Tree-of-Thoughts mock smoke (chain-mechanism regression)
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: npx tsx scripts/smoke-tests/tree-of-thoughts-angles.ts

      - name: Run position-swap calibration smoke
        run: npx tsx scripts/smoke-tests/position-swap-judge.ts

      # Runs after the deterministic smokes so a sub-threshold golden-set
      # doesn't mask their signal; artifact upload + PR comment below have
      # `if: always()` and still run when this gate fails.
      - name: Enforce golden-set pass-rate threshold (70%)
        if: steps.keys.outputs.present == 'true'
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const THRESHOLD = 70;
          const path = '.promptfoo-results/blog-post-results.json';
          if (!fs.existsSync(path)) {
            console.error('::error::Golden-set gate: no results file — promptfoo crashed before producing output.');
            process.exit(1);
          }
          // Same shape-handling as the PR-comment step below — keep in sync.
          const results = JSON.parse(fs.readFileSync(path, 'utf8'));
          const tests = results.results?.results ?? results.results ?? [];
          const total = tests.length;
          if (total === 0) {
            console.error('::error::Golden-set gate: results file contains zero test cases — eval misconfigured.');
            process.exit(1);
          }
          const passed = tests.filter((t) => t.success || t.passed).length;
          const passRate = Math.round((passed / total) * 100);
          if (passRate < THRESHOLD) {
            console.error(`::error::Golden-set gate FAILED: pass-rate ${passed}/${total} (${passRate}%) is below the ${THRESHOLD}% threshold.`);
            process.exit(1);
          }
          console.log(`Golden-set gate passed: ${passed}/${total} (${passRate}%) >= ${THRESHOLD}%.`);
          EOF

      - name: Upload golden-set results
        if: always() && steps.keys.outputs.present == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: golden-set-results-${{ github.sha }}
          path: .promptfoo-results/
          retention-days: 14

      - name: Comment results on PR
        if: always() && github.event_name == 'pull_request' && steps.keys.outputs.present == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = '.promptfoo-results/blog-post-results.json';
            if (!fs.existsSync(path)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ Golden-set evaluation produced no results — check workflow logs.',
              });
              return;
            }
            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            const tests = results.results?.results ?? results.results ?? [];
            const total = tests.length;
            const passed = tests.filter(t => t.success || t.passed).length;
            const passRate = total > 0 ? Math.round((passed / total) * 100) : 0;
            const verdict = passRate >= 70 ? '✅' : passRate >= 50 ? '⚠️' : '❌';
            const body = [
              `## ${verdict} Golden-Set Results — blog-post`,
              '',
              `**Pass-rate**: ${passed}/${total} (${passRate}%) — threshold: 70%`,
              '',
              `Full results: [download artifact](${context.payload.pull_request.html_url}/checks)`,
              '',
              `<sub>Content-test sub-sprint #5.B baseline. CI runs nightly + on prompt-template changes.</sub>`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
