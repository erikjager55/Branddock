name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run build
        env:
          # These env vars must match the required fields in src/lib/env-validation.ts
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          BETTER_AUTH_SECRET: "ci-build-secret-not-real"
          BETTER_AUTH_URL: "http://localhost:3000"
