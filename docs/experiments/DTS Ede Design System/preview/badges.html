<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 24px; background: #fff; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .badge { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 2px; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1; }
  .badge-primary { background: #0060A0; color: #fff; }
  .badge-outline { background: #fff; color: #0060A0; border: 1px solid #0060A0; }
  .badge-neutral { background: #F1F1F1; color: #555; border: 1px solid #DFDFDF; }
  .score { font-family: ui-monospace, Menlo, monospace; font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 999px; background: #0040A0; color: #fff; line-height: 1; }
  .label { font-size: 11px; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
</style>
<div class="label">Badges & Chips</div>
<div class="row">
  <span class="badge badge-primary">Thuis</span>
  <span class="badge badge-outline">KNVB</span>
  <span class="badge badge-neutral">JO13</span>
  <span class="badge badge-neutral">35+</span>
  <span class="score">3 — 1</span>
</div>
</body></html>
