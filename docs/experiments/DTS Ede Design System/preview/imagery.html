<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }

<body>
<style>
  body { padding: 20px; background: #fff; }
  .grid { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 10px; height: 200px; }
  .frame { border: 1px solid #DFDFDF; border-radius: 4px; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 10px; color: #fff; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .f1 { background: linear-gradient(135deg, #2b3a52 0%, #5b7591 60%, #8aa6b8 100%); }
  .f2 { background: linear-gradient(160deg, #355d8a 0%, #6a8eb2 100%); }
  .f3 { background: linear-gradient(180deg, #4d6376 0%, #9bb2c0 100%); }
  .frame .scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.55), transparent 60%); }
  .frame span { position: relative; z-index: 1; }
  .note { margin-top: 12px; font-size: 11px; color: #888; }
</style>
<div class="grid">
  <div class="frame f1"><div class="scrim"></div><span>Match action — JO13 toernooi</span></div>
  <div class="frame f2"><div class="scrim"></div><span>Volunteers · clubhuis</span></div>
  <div class="frame f3"><div class="scrim"></div><span>Training Sportpark</span></div>
</div>
<div class="note">Authentic moments · outdoor light · 60% action / 40% community · placeholders — replace with real DTS Ede photography.</div>
</body></html>
