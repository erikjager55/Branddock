<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 0; height: 100vh; display: flex; align-items: stretch; }
  .cover { flex: 1; background: #0060A0; color: #fff; padding: 36px 40px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .crest { position: absolute; right: -40px; top: -40px; width: 220px; height: 220px; opacity: 0.12; }
  .est { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.75; font-weight: 500; }
  .title { font-size: 44px; line-height: 1; letter-spacing: -0.02em; font-weight: 700; margin-top: 8px; }
  .tag { font-size: 16px; line-height: 1.4; max-width: 460px; opacity: 0.9; font-weight: 300; margin-top: 12px; }
  .meta { display: flex; gap: 28px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; }
</style>
<div class="cover">
  <img class="crest" src="../assets/dts-ede-logo.png" alt="" />
  <div>
    <div class="est">DTS Ede · Est. 1935</div>
    <div class="title">Design System</div>
    <div class="tag">Your football home in Ede, where everyone plays, grows, and belongs.</div>
  </div>
  <div class="meta">
    <span>Brand</span><span>Color · Type</span><span>Components</span><span>Website kit</span>
  </div>
</div>
</body></html>
