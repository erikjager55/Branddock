<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 240px; }
  .panel { display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
  .panel.light { background: #F1F1F1; }
  .panel.dark { background: #0040A0; }
  .panel img { width: 140px; height: 140px; display: block; }
  .panel .tag { position: absolute; bottom: 10px; left: 12px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #666; }
  .panel.dark .tag { color: rgba(255,255,255,0.7); }
</style>
<div class="panel light">
  <img src="../assets/dts-ede-logo.png" alt="DTS Ede crest" />
  <span class="tag">Primary · on light</span>
</div>
<div class="panel dark">
  <img src="../assets/dts-ede-logo.png" alt="DTS Ede crest" style="background: #fff; border-radius: 999px; padding: 10px;" />
  <span class="tag">on Deep Blue</span>
</div>
</body></html>
