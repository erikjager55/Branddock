<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 20px; }
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .chip { aspect-ratio: 1 / 1.3; border-radius: 3px; border: 1px solid #DFDFDF; }
  .nm { font-size: 10px; color: #333; font-weight: 500; }
  .hx { font-family: ui-monospace, Menlo, monospace; font-size: 9px; color: #888; }
</style>
<div class="ramp">
  <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="nm">White</div><div class="hx">#FFFFFF</div></div>
  <div class="swatch"><div class="chip" style="background:#F1F1F1"></div><div class="nm">Off White</div><div class="hx">#F1F1F1</div></div>
  <div class="swatch"><div class="chip" style="background:#DFDFDF"></div><div class="nm">Light Gray</div><div class="hx">#DFDFDF</div></div>
  <div class="swatch"><div class="chip" style="background:#CCCCCC"></div><div class="nm">Silver</div><div class="hx">#CCCCCC</div></div>
  <div class="swatch"><div class="chip" style="background:#999999"></div><div class="nm">Medium</div><div class="hx">#999999</div></div>
  <div class="swatch"><div class="chip" style="background:#888888"></div><div class="nm">Warm</div><div class="hx">#888888</div></div>
  <div class="swatch"><div class="chip" style="background:#666666"></div><div class="nm">Slate</div><div class="hx">#666666</div></div>
  <div class="swatch"><div class="chip" style="background:#555555"></div><div class="nm">Graphite</div><div class="hx">#555555</div></div>
  <div class="swatch"><div class="chip" style="background:#464646"></div><div class="nm">Charcoal</div><div class="hx">#464646</div></div>
  <div class="swatch"><div class="chip" style="background:#333333"></div><div class="nm">Dark</div><div class="hx">#333333</div></div>
  <div class="swatch"><div class="chip" style="background:#222222"></div><div class="nm">Near Black</div><div class="hx">#222222</div></div>
</div>
</body></html>
