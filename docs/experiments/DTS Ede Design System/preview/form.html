<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 24px; background: #fff; }
  .field { display: flex; flex-direction: column; gap: 6px; max-width: 360px; margin-bottom: 14px; }
  label { font-size: 12px; color: #333; font-weight: 500; }
  input, select { font-family: inherit; font-size: 15px; padding: 10px 12px; border: 1px solid #DFDFDF; border-radius: 4px; color: #222; background: #fff; }
  input:focus, select:focus { outline: 2px solid #0060A0; outline-offset: 2px; border-color: #0060A0; }
  .help { font-size: 11px; color: #888; }
</style>
<div class="field">
  <label>Naam speler</label>
  <input type="text" value="Lars van den Berg" />
</div>
<div class="field">
  <label>Leeftijdscategorie</label>
  <select><option>JO13</option><option>JO15</option><option>JO17</option><option>JO19</option></select>
  <span class="help">Kies de categorie die past bij het geboortejaar.</span>
</div>
</body></html>
