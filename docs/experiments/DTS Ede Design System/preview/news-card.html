<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 20px; background: #F1F1F1; display: flex; justify-content: center; align-items: center; min-height: 100%; }
  .card { background: #fff; border: 1px solid #DFDFDF; border-radius: 4px; overflow: hidden; max-width: 360px; }
  .img { aspect-ratio: 16 / 9; background: linear-gradient(135deg, #0060A0 0%, #0040A0 100%); position: relative; }
  .img .tag { position: absolute; left: 12px; top: 12px; background: #0060A0; color: #fff; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 8px; border-radius: 2px; font-weight: 500; }
  .img .placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .body-c { padding: 14px 16px 16px; }
  .meta { font-size: 11px; color: #888; letter-spacing: 0.04em; margin-bottom: 6px; }
  .title { font-size: 18px; font-weight: 700; line-height: 1.25; color: #222; letter-spacing: -0.01em; margin-bottom: 8px; }
  .summary { font-size: 13px; line-height: 1.5; color: #555; }
</style>
<div class="card">
  <div class="img">
    <span class="tag">Wedstrijd</span>
    <span class="placeholder">[ authentic match action photo ]</span>
  </div>
  <div class="body-c">
    <div class="meta">Zo 18 mei · KNVB Zaterdag 2e klasse</div>
    <div class="title">DTS Ede blijft haar zegereeks voortzetten</div>
    <div class="summary">Op Sportpark Peppelensteeg won de eerste selectie met 3 — 1 van Veensche Boys.</div>
  </div>
</div>
</body></html>
