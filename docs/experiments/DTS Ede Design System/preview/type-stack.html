<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 28px; box-sizing: border-box; min-height: 100vh; }
  .stack { display: grid; grid-template-columns: 1fr auto; gap: 6px 20px; align-items: baseline; }
  .specimen { color: #222; }
  .meta { color: #999; font-family: ui-monospace, Menlo, monospace; font-size: 11px; text-align: right; }
  .h-display { font-size: 56px; font-weight: 900; letter-spacing: -0.02em; line-height: 1; }
  .h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.1; }
  .h3 { font-size: 22px; font-weight: 500; line-height: 1.2; }
  .body { font-size: 16px; font-weight: 300; color: #464646; line-height: 1.5; }
  .small { font-size: 11px; color: #888; font-weight: 400; }
</style>
</head>
<body>
<div class="stack">
  <div class="specimen h-display">Blauw-witte</div><div class="meta">Display · Black 900 · -2%</div>
  <div class="specimen h1">DTS Ede zoekt talent</div><div class="meta">H1 · Bold 700 · -1%</div>
  <div class="specimen h3">Wedstrijd met twee gezichten</div><div class="meta">H3 · Medium 500</div>
  <div class="specimen body">DTS Ede organiseert dit toernooi voor de 23e keer op Eerste Paasdag.</div><div class="meta">Body · Light 300</div>
  <div class="specimen small">KNVB · 14:30 · Sportpark Peppelensteeg</div><div class="meta">Small · Roman 400 · meta</div>
</div>
</body></html>
