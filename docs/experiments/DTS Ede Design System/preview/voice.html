<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 22px 24px; background: #fff; }
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col h4 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin: 0 0 8px; font-weight: 500; }
  .quote { font-size: 14px; line-height: 1.45; padding: 10px 12px; border-radius: 4px; }
  .do { background: #fff; border-left: 3px solid #0060A0; color: #222; padding-left: 12px; }
  .dont { background: #F1F1F1; border-left: 3px solid #CCCCCC; color: #888; text-decoration: line-through; text-decoration-color: #BBB; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
</style>
<div class="pair">
  <div class="col">
    <h4>Do say</h4>
    <div class="stack">
      <div class="quote do">DTS Ede blijft haar zegereeks voortzetten</div>
      <div class="quote do">WELKOM BIJ DTS EDE</div>
      <div class="quote do">Wedstrijd met twee gezichten</div>
    </div>
  </div>
  <div class="col">
    <h4>Don't say</h4>
    <div class="stack">
      <div class="quote dont">We zijn trots om aan te kondigen…</div>
      <div class="quote dont">Ons state-of-the-art faciliteitencomplex…</div>
      <div class="quote dont">Sluit je vandaag nog aan bij de familie!</div>
    </div>
  </div>
</div>
</body></html>
