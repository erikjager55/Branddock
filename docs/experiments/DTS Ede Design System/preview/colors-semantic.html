<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
</style>
</head>
<body>
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .item { display: flex; flex-direction: column; gap: 10px; }
  .preview { height: 80px; border-radius: 4px; border: 1px solid #DFDFDF; padding: 10px; display: flex; align-items: flex-end; font-size: 12px; }
  .label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: #888; font-weight: 500; }
  .desc { font-size: 12px; color: #333; }
</style>
<div class="grid">
  <div class="item">
    <div class="preview" style="background:#0060A0; color:#fff;">Aa <span style="margin-left:auto;font-size:11px;opacity:.8">CTA</span></div>
    <div class="label">--brand-primary</div>
    <div class="desc">Primary actions, links, focus</div>
  </div>
  <div class="item">
    <div class="preview" style="background:#0040A0; color:#fff;">Aa <span style="margin-left:auto;font-size:11px;opacity:.8">Footer</span></div>
    <div class="label">--bg-dark</div>
    <div class="desc">Footer, hover, dark surfaces</div>
  </div>
  <div class="item">
    <div class="preview" style="background:#FFFFFF; color:#222; border-color:#DFDFDF;">Aa <span style="margin-left:auto;font-size:11px;color:#888">Card</span></div>
    <div class="label">--bg-surface</div>
    <div class="desc">Cards, panels, sticky header</div>
  </div>
  <div class="item">
    <div class="preview" style="background:#F1F1F1; color:#464646;">Aa <span style="margin-left:auto;font-size:11px;color:#888">Page</span></div>
    <div class="label">--bg-page</div>
    <div class="desc">Default page background</div>
  </div>
</div>
</body></html>
