<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: #fff; margin: 0; padding: 0; }
  body { padding: 24px; box-sizing: border-box; min-height: 100vh; }
  .scale { display: grid; grid-template-columns: 56px 1fr 96px; gap: 14px 18px; align-items: baseline; }
  .px { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #888; text-align: right; padding-top: 6px; }
  .sample { color: #222; line-height: 1; }
  .wt { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: #999; letter-spacing: 0.04em; text-align: right; }
</style>
</head>
<body>
<div class="scale">
  <div class="px">88</div>
  <div class="sample" style="font-size:60px; font-weight:900; letter-spacing:-0.02em;">Display</div>
  <div class="wt">Black 900</div>

  <div class="px">64</div>
  <div class="sample" style="font-size:44px; font-weight:700; letter-spacing:-0.02em;">H1 — Heading</div>
  <div class="wt">Bold 700</div>

  <div class="px">40</div>
  <div class="sample" style="font-size:30px; font-weight:700;">H2 — Heading</div>
  <div class="wt">Bold 700</div>

  <div class="px">30</div>
  <div class="sample" style="font-size:22px; font-weight:500;">H3 — Heading</div>
  <div class="wt">Medium 500</div>

  <div class="px">20</div>
  <div class="sample" style="font-size:16px; font-weight:300; color:#464646;">Body — paragraph text</div>
  <div class="wt">Light 300</div>

  <div class="px">18</div>
  <div class="sample" style="font-size:14px; font-weight:400; color:#666;">Caption — supporting text</div>
  <div class="wt">Roman 400</div>

  <div class="px">12</div>
  <div class="sample" style="font-size:11px; font-weight:500; color:#888; text-transform:uppercase; letter-spacing:0.12em;">SMALL · UPPERCASE LABEL</div>
  <div class="wt">Medium 500</div>
</div>
</body></html>
